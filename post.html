<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Article – Torat Habayit Institute</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .post-hero {
      background: var(--navy);
      padding: 120px 0 60px;
      position: relative;
      overflow: hidden;
    }
    .post-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(197,160,89,0.08) 0%, transparent 60%);
    }
    .post-hero .container { position: relative; z-index: 1; }
    .post-meta { color: rgba(255,255,255,0.55); font-size: 0.9rem; margin-top: 0.75rem; }
    .post-body {
      max-width: 740px;
      margin: 0 auto;
    }
    .post-body p { margin-bottom: 1.3rem; line-height: 1.9; font-size: 1.05rem; color: var(--charcoal); }
    .post-body h2 { color: var(--navy); margin: 2rem 0 1rem; }
    .post-body h3 { color: var(--navy); margin: 1.5rem 0 0.75rem; }
    .post-body blockquote {
      border-left: 4px solid var(--gold);
      padding: 1rem 1.5rem;
      margin: 2rem 0;
      background: var(--gray-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--navy);
    }
    .post-featured-img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: var(--radius-lg);
      margin-bottom: 2.5rem;
      box-shadow: var(--shadow-lg);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }
    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<!-- ─── Post Hero ─── -->
<section class="post-hero" id="post-hero">
  <div class="container">
    <a href="blog.html" class="back-link" data-i18n="post_back_link">← Back to Blog</a>
    <div id="post-cat" class="eyebrow" style="margin-bottom:0.5rem;"></div>
    <h1 id="post-title" style="color:var(--white); max-width:780px;"></h1>
    <div class="post-meta" id="post-meta"></div>
  </div>
</section>

<!-- ─── Post Body ─── -->
<section class="section section-white">
  <div class="container">
    <div class="post-body">
      <img id="post-img" src="" alt="" class="post-featured-img" style="display:none;">
      <div id="post-content"></div>
    </div>

    <!-- Share + Related -->
    <div style="max-width:740px; margin:3rem auto 0; padding-top:2rem; border-top:1px solid var(--gray-200); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
      <div>
        <span style="font-size:0.85rem; color:var(--gray-600); margin-right:0.75rem;" data-i18n="post_share">Share:</span>
        <a href="#" onclick="sharePost('facebook')" style="color:var(--navy); margin-right:0.75rem; font-size:0.85rem;">Facebook</a>
        <a href="#" onclick="sharePost('twitter')"  style="color:var(--navy); margin-right:0.75rem; font-size:0.85rem;">Twitter</a>
        <a href="#" onclick="sharePost('whatsapp')" style="color:var(--navy); font-size:0.85rem;">WhatsApp</a>
      </div>
      <a href="blog.html" class="btn btn-outline-gold btn-sm" data-i18n="post_more_btn">← More Articles</a>
    </div>
  </div>
</section>

<!-- ─── Related Posts ─── -->
<section class="section section-gray" style="padding:60px 0;" id="related-section">
  <div class="container">
    <h3 style="color:var(--navy); margin-bottom:2rem;" data-i18n="post_more_hdr">More Articles</h3>
    <div class="blog-grid" id="related-posts"></div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script src="js/blog.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const slug = params.get('slug');

  let post = null;
  if (id) post = BlogStore.getPost(id);
  else if (slug) post = BlogStore.getPostBySlug(slug);

  if (!post || post.status !== 'published') {
    document.getElementById('post-title').setAttribute('data-i18n', 'post_not_found_tit');
    document.getElementById('post-content').innerHTML = '<p><span data-i18n="post_not_found_desc">Sorry, this article could not be found.</span> <a href="blog.html" data-i18n="post_ret_blog">Return to blog →</a></p>';
    if (typeof updateLanguage === 'function') {
      const currentLang = localStorage.getItem('siteLang') || 'en';
      setTimeout(() => updateLanguage(currentLang), 10);
    }
    return;
  }

  // Set page title
  document.title = post.title + ' – Torat Habayit Institute';
  document.getElementById('page-title').textContent = post.title + ' – Torat Habayit Institute';

  const catKey = post.category === 'Halacha' ? 'blog_cat_halacha' : (post.category === 'Practical Halacha' ? 'blog_cat_practical' : 'blog_cat_announcements');
  const authorKey = post.author.includes('Rabbi') ? 'blog_auth_1' : 'blog_auth_2';
  const titleKey = `blog_post_${post.id}_tit`;
  const conKey = `blog_post_${post.id}_con`;

  // Hero
  const postCat = document.getElementById('post-cat');
  postCat.textContent = post.category;
  postCat.setAttribute('data-i18n', catKey);
  
  const postTitle = document.getElementById('post-title');
  postTitle.textContent = post.title;
  postTitle.setAttribute('data-i18n', titleKey);

  const dateFormatted = new Date(post.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('post-meta').innerHTML = `${dateFormatted} · <span data-i18n="${authorKey}">${post.author}</span>`;

  // Featured image
  if (post.image) {
    const img = document.getElementById('post-img');
    img.src = post.image;
    img.alt = post.title;
    img.style.display = 'block';
  }

  // Content
  const postContent = document.getElementById('post-content');
  postContent.innerHTML = post.content;
  postContent.setAttribute('data-i18n', conKey);

  // Related posts
  const related = BlogStore.getPosts()
    .filter(p => p.id !== post.id && p.status === 'published')
    .slice(0, 3);
  const relatedGrid = document.getElementById('related-posts');
  if (related.length > 0) {
    relatedGrid.innerHTML = related.map(renderBlogCard).join('');
  } else {
    document.getElementById('related-section').style.display = 'none';
  }
  
  if (typeof updateLanguage === 'function') {
    const currentLang = localStorage.getItem('siteLang') || 'en';
    setTimeout(() => updateLanguage(currentLang), 10);
  }
});

function sharePost(platform) {
  const url = encodeURIComponent(window.location.href);
  const title = encodeURIComponent(document.title);
  const urls = {
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
    twitter: `https://twitter.com/intent/tweet?url=${url}&text=${title}`,
    whatsapp: `https://wa.me/?text=${title}%20${url}`,
  };
  window.open(urls[platform], '_blank', 'width=600,height=400');
}
</script>
</body>
</html>
