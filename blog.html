<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog &amp; Articles – Torat Habayit Institute</title>
  <meta name="description" content="Articles, insights and announcements from the Torat Habayit Institute on Medical Halacha.">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div id="header-placeholder"></div>

<!-- ─── Hero ─── -->
<section class="page-hero">
  <div class="container">
    <span class="eyebrow">Knowledge & Insights</span>
    <h1>Articles &amp; Blog</h1>
    <div class="gold-divider" style="margin:1rem 0;"></div>
    <p>Halachic insights, announcements, and educational content from the Torat Habayit Institute.</p>
  </div>
</section>

<!-- ─── Blog Grid ─── -->
<section class="section section-white">
  <div class="container">

    <!-- Category Filter -->
    <div class="gallery-filters" id="blog-filters" style="justify-content:flex-start; margin-bottom:2.5rem;">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="Halacha">Halacha</button>
      <button class="filter-btn" data-cat="Practical Halacha">Practical</button>
      <button class="filter-btn" data-cat="Announcements">Announcements</button>
      <button class="filter-btn" data-cat="Research">Research</button>
    </div>

    <div id="blog-grid" class="blog-grid">
      <p style="color:var(--gray-400); grid-column:1/-1; text-align:center; padding:3rem 0;">Loading posts...</p>
    </div>

  </div>
</section>

<!-- ─── Newsletter Callout ─── -->
<section class="section section-navy" style="padding:70px 0;">
  <div class="container" style="max-width:600px; text-align:center;">
    <span class="eyebrow">Stay Informed</span>
    <h2 style="color:var(--white); margin:0.75rem 0 1rem;">Subscribe to Our Newsletter</h2>
    <p style="color:rgba(255,255,255,0.7); margin-bottom:2rem;">Receive new articles, halachic insights, and seminar announcements directly to your inbox.</p>
    <form style="display:flex; gap:0; max-width:440px; margin:0 auto;" onsubmit="subscribeNewsletter(event)">
      <input type="email" placeholder="Your email address" required
        style="flex:1; padding:0.9rem 1.25rem; background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.2); border-right:none; border-radius:50px 0 0 50px; color:var(--white); font-size:0.9rem;">
      <button type="submit" style="padding:0.9rem 1.5rem; background:var(--gold); color:var(--navy); font-weight:700; border-radius:0 50px 50px 0; border:none; cursor:pointer;">Subscribe</button>
    </form>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script src="js/blog.js"></script>
<script>
let allPosts = [];

function loadBlog(catFilter = 'all') {
  const grid = document.getElementById('blog-grid');
  const posts = BlogStore.getPosts().filter(p => p.status === 'published');
  allPosts = posts;
  const filtered = catFilter === 'all' ? posts : posts.filter(p => p.category === catFilter);

  if (filtered.length === 0) {
    grid.innerHTML = '<p style="color:var(--gray-400);grid-column:1/-1;text-align:center;padding:3rem 0">No posts in this category yet.</p>';
    return;
  }
  grid.innerHTML = filtered.map(renderBlogCard).join('');
}

function subscribeNewsletter(e) {
  e.preventDefault();
  showToast('Thank you for subscribing!');
  e.target.reset();
}

document.addEventListener('DOMContentLoaded', () => {
  loadBlog();
  document.querySelectorAll('#blog-filters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#blog-filters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadBlog(btn.dataset.cat);
    });
  });
});
</script>
</body>
</html>
